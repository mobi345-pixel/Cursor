<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${guestHouse.name} + ' - Guest House Details'">Guest House Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">
                <i class="fas fa-home"></i>
                Guest House Reservation System
            </h1>
            <nav class="nav">
                <a href="/" class="nav-link">Home</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#contact" class="nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <section class="breadcrumb">
            <div class="container">
                <nav class="breadcrumb-nav">
                    <a href="/" class="breadcrumb-link">Home</a>
                    <span class="breadcrumb-separator">></span>
                    <a th:href="@{'/city/' + ${guestHouse.city.name}}" th:text="${guestHouse.city.name}" class="breadcrumb-link">City</a>
                    <span class="breadcrumb-separator">></span>
                    <span class="breadcrumb-current" th:text="${guestHouse.name}">Guest House</span>
                </nav>
            </div>
        </section>

        <section class="guesthouse-details-section">
            <div class="container">
                <div class="guesthouse-header">
                    <div class="guesthouse-image-large">
                        <i class="fas fa-building"></i>
                    </div>
                    <div class="guesthouse-info">
                        <h1 th:text="${guestHouse.name}" class="guesthouse-title"></h1>
                        <p th:text="${guestHouse.address}" class="guesthouse-address"></p>
                        <p th:text="${guestHouse.description}" class="guesthouse-description"></p>
                        <div class="guesthouse-amenities" th:if="${guestHouse.amenities}">
                            <h3>Amenities</h3>
                            <p th:text="${guestHouse.amenities}"></p>
                        </div>
                    </div>
                </div>

                <div class="availability-section">
                    <h2>Check Availability</h2>
                    <div class="date-picker">
                        <div class="date-input-group">
                            <label for="checkIn">Check-in Date</label>
                            <input type="date" id="checkIn" name="checkIn" required>
                        </div>
                        <div class="date-input-group">
                            <label for="checkOut">Check-out Date</label>
                            <input type="date" id="checkOut" name="checkOut" required>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="checkAvailability()">
                            Check Availability
                        </button>
                    </div>
                </div>

                <div class="rooms-section">
                    <h2>Available Rooms</h2>
                    <div id="roomsContainer" class="rooms-grid">
                        <div th:each="room : ${guestHouse.rooms}" class="room-card">
                            <div class="room-image">
                                <i class="fas fa-bed"></i>
                            </div>
                            <div class="room-content">
                                <h3 th:text="${room.roomNumber}" class="room-number"></h3>
                                <p th:text="${room.roomType}" class="room-type"></p>
                                <p th:text="${room.description}" class="room-description"></p>
                                <div class="room-details">
                                    <span class="room-capacity">
                                        <i class="fas fa-users"></i>
                                        <span th:text="${room.capacity}">0</span> guests
                                    </span>
                                    <span class="room-price">
                                        <i class="fas fa-dollar-sign"></i>
                                        $<span th:text="${room.pricePerNight}">0</span>/night
                                    </span>
                                </div>
                                <button class="btn btn-secondary" onclick="bookRoom([[${room.id}]])">
                                    Book This Room
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Guest House Reservation System. All rights reserved.</p>
        </div>
    </footer>

    <script th:src="@{/js/main.js}"></script>
    <script>
        function checkAvailability() {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            
            if (!checkIn || !checkOut) {
                alert('Please select both check-in and check-out dates');
                return;
            }
            
            if (new Date(checkIn) >= new Date(checkOut)) {
                alert('Check-out date must be after check-in date');
                return;
            }
            
            // Here you would typically make an AJAX call to check availability
            // For now, we'll just show all rooms
            document.getElementById('roomsContainer').style.display = 'grid';
        }
        
        function bookRoom(roomId) {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            
            if (!checkIn || !checkOut) {
                alert('Please select check-in and check-out dates first');
                return;
            }
            
            window.location.href = `/booking/room/${roomId}?checkIn=${checkIn}&checkOut=${checkOut}`;
        }
    </script>
</body>
</html>
